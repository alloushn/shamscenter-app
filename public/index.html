<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>شمس</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f6f7fb;color:#14213d}.layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.sidebar{background:#fff;padding:20px;border-left:1px solid #eee}.nav button{display:block;width:100%;margin:8px 0;padding:12px;border:none;border-radius:10px;background:#f1f4fb;cursor:pointer;text-align:right}.main{padding:20px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card,.section{background:#fff;border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.05)}.metric{font-size:28px;font-weight:700;margin-top:8px}.section{margin-top:16px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}input,select,textarea{padding:12px;border:1px solid #ddd;border-radius:10px;width:100%;box-sizing:border-box}button.primary{background:#1657a8;color:#fff;border:none;padding:12px 16px;border-radius:10px;cursor:pointer}button.scan{background:#1f9d55;color:#fff;border:none;padding:12px 16px;border-radius:10px;cursor:pointer}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #eee;text-align:right}.result{background:#f1fff6;border:1px solid #ccebd7;padding:12px;border-radius:12px;margin-top:12px}@media(max-width:1000px){.layout{grid-template-columns:1fr}.cards,.grid,.grid2{grid-template-columns:1fr}}
</style></head><body>
<div class="layout"><aside class="sidebar"><h2>شمس</h2><div class="nav"><button onclick="show('dashboard')">لوحة التحكم</button><button onclick="show('register')">تسجيل طالب</button><button onclick="show('students')">الطلاب</button><button onclick="show('attendance')">الحضور</button></div></aside><main class="main"><div id="app"></div></main></div>
<script>
let current='dashboard';
async function api(url, options={}){const res=await fetch(url,{headers:{'Content-Type':'application/json'},...options});return res.json();}
function show(v){current=v;render();}
async function render(){const app=document.getElementById('app');
if(current==='dashboard'){const d=await api('/api/dashboard');app.innerHTML=`<h1>لوحة التحكم</h1><div class="cards"><div class="card"><div>إجمالي الطلاب</div><div class="metric">${d.totalStudents}</div></div><div class="card"><div>الطلاب النشطون</div><div class="metric">${d.activeStudents}</div></div><div class="card"><div>إجمالي المدخول</div><div class="metric">${d.totalRevenue}</div></div><div class="card"><div>داخل المركز الآن</div><div class="metric">${d.studentsInside}</div></div></div>`;}
if(current==='register'){app.innerHTML=`<h1>تسجيل طالب جديد</h1><form id="regForm" class="section"><h3>معلومات الطالب</h3><div class="grid"><input name="student_name" placeholder="اسم الطالب" required/><input name="grade" placeholder="الصف" required/><input name="photo_url" placeholder="رابط صورة الطالب (اختياري)"/><select name="student_status"><option value="active">نشط</option><option value="inactive">غير نشط</option></select><select name="subscription_type"><option value="monthly">شهري</option><option value="package">باقة</option><option value="daily">يومي</option><option value="hourly">بالساعة</option></select><input name="subscription_price" type="number" step="0.01" placeholder="سعر الاشتراك"/><input name="sessions_count" type="number" placeholder="عدد الحصص (للباقة)"/><input name="start_date" type="date" required/><input name="student_notes" placeholder="ملاحظات الطالب"/></div><h3>معلومات ولي الأمر</h3><div class="grid"><input name="guardian_name" placeholder="اسم ولي الأمر" required/><input name="phone_primary" placeholder="رقم الجوال الأساسي" required/><input name="phone_secondary" placeholder="رقم بديل"/><input name="relation" placeholder="صلة القرابة"/><select name="preferred_channel"><option value="whatsapp">WhatsApp</option><option value="sms">SMS</option></select><input name="guardian_notes" placeholder="ملاحظات ولي الأمر"/></div><h3>الدفعة الأولى</h3><div class="grid2"><input name="first_payment_amount" type="number" step="0.01" placeholder="المبلغ المدفوع"/><select name="first_payment_method"><option value="cash">كاش</option><option value="visa">فيزا</option></select><input name="first_payment_date" type="date"/><input name="first_payment_notes" placeholder="ملاحظات الدفعة"/></div><div style="margin-top:12px"><button class="primary" type="submit">حفظ الطالب وتوليد QR</button></div><div id="regResult"></div></form>`;document.getElementById('regForm').onsubmit=async e=>{e.preventDefault();const fd=new FormData(e.target);const payload=Object.fromEntries(fd.entries());const r=await api('/api/students',{method:'POST',body:JSON.stringify(payload)});document.getElementById('regResult').innerHTML=`<div class="result"><strong>تم حفظ الطالب بنجاح</strong><br/>رقم الطالب: ${r.id}<br/>تاريخ انتهاء الاشتراك: ${r.end_date}<br/><br/><img src="${r.qr_code_data_url}" style="width:180px;height:180px"/></div>`};}
if(current==='students'){const rows=await api('/api/students');app.innerHTML=`<h1>الطلاب</h1><div class="section"><table><thead><tr><th>#</th><th>الاسم</th><th>الصف</th><th>ولي الأمر</th><th>الجوال</th><th>الاشتراك</th><th>النهاية</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.id}</td><td><a href="#" onclick="viewStudent(${r.id});return false;">${r.full_name}</a></td><td>${r.grade}</td><td>${r.guardian_name||''}</td><td>${r.phone_primary||''}</td><td>${r.subscription_type}</td><td>${(r.end_date||'').slice(0,10)}</td></tr>`).join('')}</tbody></table></div><div id="studentProfile"></div>`;}
if(current==='attendance'){app.innerHTML=`<h1>الحضور</h1><div class="section"><p>في هذه النسخة يتم إدخال رقم الطالب بدل قراءة الكاميرا. لاحقًا نربط QR Scanner فعلي.</p><div class="grid2"><input id="scanStudentId" placeholder="رقم الطالب"/><button class="scan" onclick="scanAttendance()">تسجيل scan</button></div><div id="scanResult"></div></div>`;}
}
async function viewStudent(id){const d=await api('/api/students/'+id);document.getElementById('studentProfile').innerHTML=`<div class="section"><h3>ملف الطالب: ${d.student.full_name}</h3><div class="grid2"><div><p><strong>الصف:</strong> ${d.student.grade}</p><p><strong>ولي الأمر:</strong> ${d.student.guardian_name||''}</p><p><strong>الهاتف:</strong> ${d.student.phone_primary||''}</p><p><strong>الاشتراك:</strong> ${d.student.subscription_type}</p><p><strong>تاريخ الانتهاء:</strong> ${(d.student.end_date||'').slice(0,10)}</p><p><strong>السعر:</strong> ${d.student.subscription_price||0}</p></div><div>${d.student.qr_code_data_url?`<img src="${d.student.qr_code_data_url}" style="width:180px;height:180px"/>`:''}</div></div><h4>الدفعات</h4><table><thead><tr><th>المبلغ</th><th>الطريقة</th><th>التاريخ</th></tr></thead><tbody>${d.payments.map(p=>`<tr><td>${p.amount}</td><td>${p.payment_method}</td><td>${(p.payment_date||'').slice(0,10)}</td></tr>`).join('')}</tbody></table><h4 style="margin-top:16px">الحضور</h4><table><thead><tr><th>الحدث</th><th>الوقت</th></tr></thead><tbody>${d.attendance.map(a=>`<tr><td>${a.event_type}</td><td>${new Date(a.logged_at).toLocaleString('en-GB')}</td></tr>`).join('')}</tbody></table></div>`;}
async function scanAttendance(){const student_id=document.getElementById('scanStudentId').value;const r=await api('/api/attendance/scan',{method:'POST',body:JSON.stringify({student_id})});document.getElementById('scanResult').innerHTML=`<div class="result"><strong>${r.student_name}</strong><br/>العملية: ${r.event_type}<br/>الرسالة الجاهزة لولي الأمر:<br/>${r.message_to_guardian}</div>`;}
render();
</script></body></html>
